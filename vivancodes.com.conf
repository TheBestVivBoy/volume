server {
    listen 80;
    listen [::]:80;
    server_name volume.vivan.site vivancodes.com www.vivancodes.com;

    location ^~ /.well-known/acme-challenge/ {
        root /srv/sites/volume;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name volume.vivan.site;

    ssl_certificate /etc/letsencrypt/live/volume.vivan.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/volume.vivan.site/privkey.pem;

    root /srv/sites/volume;
    index index.html;

    charset utf-8;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), microphone=(), payment=(), usb=()" always;

    location ^~ /private/ {
        return 404;
    }

    location = /sliders { return 301 /sliders/; }
    location = /sliders/alphabetical { return 301 /sliders/alphabetical/; }
    location = /sliders/alphabetical.html { return 301 /sliders/alphabetical/; }
    location = /sliders/drag { return 301 /sliders/drag/; }
    location = /sliders/drag.html { return 301 /sliders/drag/; }
    location = /sliders/inertia { return 301 /sliders/inertia/; }
    location = /sliders/inertia.html { return 301 /sliders/inertia/; }
    location = /sliders/spinner { return 301 /sliders/spinner/; }
    location = /sliders/spinner.html { return 301 /sliders/spinner/; }
    location = /sliders/tictactoe { return 301 /sliders/tictactoe/; }
    location = /sliders/tictactoe.html { return 301 /sliders/tictactoe/; }

    location ~* ^/assets/.+\.(?:css|js|mjs|svg|png|jpe?g|webp|gif|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    location = /assets/audio/manifest.json {
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=86400" always;
        try_files $uri =404;
    }

    location ~* ^/assets/audio/.+\.(?:m4a|mp3|aac|ogg|opus|webm)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Accept-Ranges "bytes" always;
        try_files $uri =404;
    }

    location ~* ^/(robots\.txt|sitemap\.xml)$ {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

