<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Gates | Volume</title>
    <meta name="description" content="Steer through lane gates. " />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="theme-color" content="#f2f1ec" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Volume" />
    <meta property="og:title" content="Gates | Volume" />
    <meta property="og:description" content="Steer through lane gates. " />
    <meta
      property="og:url"
      content="https://volume.vivan.site/sliders/gates/"
    />
    <meta
      property="og:image"
      content="https://volume.vivan.site/assets/vivancodes_logo.png"
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Gates | Volume" />
    <meta name="twitter:description" content="Steer through lane gates. " />
    <link rel="canonical" href="https://volume.vivan.site/sliders/gates/" />
    <link rel="icon" type="image/png" href="../../assets/vivancodes_logo.png" />
    <link rel="stylesheet" href="../../assets/site.css" />
    <style>
      :root {
        --ink: #171717;
        --muted: #6a6962;
        --line: rgba(23, 23, 23, 0.13);
        --line-soft: rgba(23, 23, 23, 0.08);
        --surface: rgba(255, 255, 255, 0.74);
        --surface-strong: rgba(255, 255, 255, 0.88);
        --good-bg: #e5efe5;
        --good-border: #5f8a64;
        --good-text: #29472d;
        --bad-bg: #f5e4df;
        --bad-border: #9e5d50;
        --bad-text: #5f2418;
      }

      * {
        box-sizing: border-box;
      }

      body {
        user-select: none;
        -webkit-user-select: none;
      }

      .project-stage {
        width: 100%;
        padding-bottom: 44px;
      }

      .gates-wrap {
        width: min(94vw, 560px);
        display: grid;
        gap: 14px;
        justify-items: center;
      }

      .vol-readout {
        margin: 0;
        font-size: clamp(2.5rem, 10vw, 4rem);
        line-height: 0.94;
        letter-spacing: -0.06em;
        font-variant-numeric: tabular-nums;
        font-weight: 500;
        color: var(--ink);
      }

      .game-card {
        position: relative;
        width: 100%;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: var(--surface);
        box-shadow: 0 10px 24px rgba(17, 17, 17, 0.04);
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100%;
        height: auto;
        aspect-ratio: 14 / 11;
        touch-action: none;
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(242, 241, 236, 0.92);
      }

      .overlay.hidden {
        display: none;
      }

      .overlay-card {
        width: min(84%, 360px);
        border: 1px solid var(--line);
        background: var(--surface-strong);
        border-radius: 12px;
        padding: 16px;
        display: grid;
        gap: 12px;
        text-align: center;
      }

      .overlay-title {
        margin: 0;
        font-size: 1.06rem;
        letter-spacing: -0.01em;
        color: var(--ink);
      }

      .overlay-text {
        margin: 0;
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.45;
      }

      .action-row {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn {
        appearance: none;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        border-radius: 10px;
        padding: 7px 16px;
        font-size: 0.84rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        cursor: pointer;
      }

      .btn:hover {
        border-color: rgba(23, 23, 23, 0.25);
      }

      .btn:focus-visible {
        outline: 2px solid #111;
        outline-offset: 2px;
      }

      .btn--solid {
        background: var(--ink);
        color: #f8f8f8;
        border-color: var(--ink);
      }

      .lane-controls {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .lane-btn {
        appearance: none;
        border: 1px solid var(--line-soft);
        background: rgba(255, 255, 255, 0.65);
        color: #4f4c44;
        border-radius: 10px;
        padding: 8px 0;
        font-size: 0.76rem;
        letter-spacing: 0.01em;
        cursor: pointer;
      }

      .lane-btn:hover {
        border-color: var(--line);
      }

      .lane-btn.is-active {
        border-color: var(--line);
        background: rgba(255, 255, 255, 0.96);
        color: #1b1b1b;
      }

      .status {
        margin: 0;
        min-height: 1.3em;
        color: var(--muted);
        text-align: center;
        font-size: 0.84rem;
        letter-spacing: -0.01em;
      }

      @media (max-width: 520px) {
        .project-stage {
          padding-bottom: 36px;
        }

        .gates-wrap {
          width: min(96vw, 560px);
          gap: 12px;
        }

        .lane-btn {
          font-size: 0.72rem;
          padding: 7px 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .btn,
        .lane-btn {
          transition: none;
        }
      }
    </style>
  </head>
  <body class="project-page" data-site-root="../../">
    <div class="page-shell">
      <div data-site-header></div>

      <header class="page-bar">
        <div class="page-bar-copy">
          <h1>Gates</h1>
          <p>Move lane to lane.</p>
        </div>
      </header>

      <main class="project-stage">
        <section class="gates-wrap" aria-label="Gates volume game">
          <p class="vol-readout" id="volReadout">20%</p>

          <div class="game-card" id="gameCard">
            <canvas id="gameCanvas"></canvas>

            <div class="overlay" id="overlay">
              <div class="overlay-card">
                <h2 class="overlay-title" id="overlayTitle">Gates</h2>
                <p class="overlay-text" id="overlayText">
                  Drag across the board, use arrow keys, or tap lane buttons.
                </p>
                <div class="action-row">
                  <button class="btn btn--solid" id="primaryBtn" type="button">
                    Start
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="lane-controls" role="group" aria-label="Choose lane">
            <button class="lane-btn" id="lane0" type="button">Left</button>
            <button class="lane-btn is-active" id="lane1" type="button">
              Center
            </button>
            <button class="lane-btn" id="lane2" type="button">Right</button>
          </div>

          <p class="status" id="statusLine">Choose a lane, then start.</p>
        </section>
      </main>
    </div>

    <script src="../../assets/site.js"></script>
    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const overlay = document.getElementById("overlay");
      const overlayTitle = document.getElementById("overlayTitle");
      const overlayText = document.getElementById("overlayText");
      const primaryBtn = document.getElementById("primaryBtn");
      const volReadout = document.getElementById("volReadout");
      const statusLine = document.getElementById("statusLine");
      const laneButtons = [
        document.getElementById("lane0"),
        document.getElementById("lane1"),
        document.getElementById("lane2"),
      ];

      const VIEW_W = 560;
      const VIEW_H = 440;
      const LANES = 3;
      const START_VOLUME = 20;
      const MAX_VOLUME = 100;
      const INITIAL_GATE_COUNT = 10;
      const GATE_SPACING = 196;
      const GATE_SPEED = 102;
      const PLAYER_Y = VIEW_H - 74;
      const GATE_HEIGHT = 46;

      const POS_EFFECTS = [
        { label: "+2", apply: (value) => value + 2 },
        { label: "+3", apply: (value) => value + 3 },
        { label: "+4", apply: (value) => value + 4 },
        { label: "x1.1", apply: (value) => value * 1.1 },
        { label: "x1.2", apply: (value) => value * 1.2 },
      ];

      const NEG_EFFECTS = [
        { label: "-1", apply: (value) => value - 1 },
        { label: "-2", apply: (value) => value - 2 },
        { label: "-3", apply: (value) => value - 3 },
        { label: "/1.1", apply: (value) => value / 1.1 },
        { label: "/1.2", apply: (value) => value / 1.2 },
      ];

      let dpr = 1;
      let rafId = 0;
      let previousTime = 0;
      let gameState = "idle";
      let volume = START_VOLUME;
      let gates = [];
      let passedGates = 0;
      let lane = 1;
      let laneVisual = 1;
      let pointerId = null;

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function randomPick(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      function rounded(value) {
        return Math.round(value * 10) / 10;
      }

      function getLayout(width) {
        const inset = Math.round(width * 0.11);
        const laneWidth = (width - inset * 2) / LANES;
        return {
          inset,
          laneWidth,
          gateWidth: laneWidth - 10,
          gateHeight: GATE_HEIGHT,
          playerY: PLAYER_Y,
          laneCenter: (laneIndex) =>
            inset + laneWidth * laneIndex + laneWidth * 0.5,
        };
      }

      function iconOffsets(count) {
        const offsets = [];
        const golden = Math.PI * (3 - Math.sqrt(5));
        const scale = 4.8 + Math.sqrt(count) * 1.7;

        for (let i = 0; i < count; i += 1) {
          const ratio = count === 1 ? 0 : i / (count - 1);
          const radius = scale * Math.sqrt(ratio);
          const angle = i * golden;
          offsets.push({
            x: Math.cos(angle) * radius,
            y: Math.sin(angle) * radius,
          });
        }

        return offsets;
      }

      const offsetCache = new Map();
      function getOffsets(count) {
        if (!offsetCache.has(count)) {
          offsetCache.set(count, iconOffsets(count));
        }
        return offsetCache.get(count);
      }

      function drawRoundedRect(x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + width - r, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + r);
        ctx.lineTo(x + width, y + height - r);
        ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
        ctx.lineTo(x + r, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      function drawSpeaker(x, y, size, alpha) {
        const s = size;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(x - s * 0.5, y - s * 0.5);
        ctx.scale(s / 24, s / 24);

        ctx.fillStyle = "#171717";
        ctx.beginPath();
        ctx.moveTo(11, 5);
        ctx.lineTo(6, 9);
        ctx.lineTo(2, 9);
        ctx.lineTo(2, 15);
        ctx.lineTo(6, 15);
        ctx.lineTo(11, 19);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "#171717";
        ctx.lineWidth = 1.7;
        ctx.lineCap = "round";

        ctx.beginPath();
        ctx.arc(12.3, 12, 5, -0.93, 0.93);
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(12, 12, 9, -0.93, 0.93);
        ctx.stroke();

        ctx.restore();
      }

      function describeEffect(effect) {
        if (!effect) {
          return "Skip";
        }
        return effect.label;
      }

      function createGateEffects() {
        const freeLane = Math.floor(Math.random() * LANES);
        const remaining = [0, 1, 2].filter((value) => value !== freeLane);

        const positiveLane =
          remaining[Math.floor(Math.random() * remaining.length)];
        const negativeLane = remaining.find((value) => value !== positiveLane);

        const effects = [null, null, null];
        effects[positiveLane] = {
          ...randomPick(POS_EFFECTS),
          tone: "positive",
        };
        effects[negativeLane] = {
          ...randomPick(NEG_EFFECTS),
          tone: "negative",
        };
        return effects;
      }

      function makeGate(index) {
        return {
          y: -120 - index * GATE_SPACING,
          effects: createGateEffects(),
          resolved: false,
        };
      }

      function buildGates() {
        gates = [];
        for (let i = 0; i < INITIAL_GATE_COUNT; i += 1) {
          gates.push(makeGate(i));
        }
      }

      function setLane(nextLane) {
        lane = clamp(nextLane, 0, LANES - 1);
        laneButtons.forEach((button, index) => {
          button.classList.toggle("is-active", lane === index);
        });
      }

      function setVolume(value) {
        volume = clamp(rounded(value), 0, MAX_VOLUME);
        volReadout.textContent = `${Math.round(volume)}%`;
      }

      function showOverlay(title, text, buttonLabel) {
        overlayTitle.textContent = title;
        overlayText.textContent = text;
        primaryBtn.textContent = buttonLabel;
        overlay.classList.remove("hidden");
      }

      function hideOverlay() {
        overlay.classList.add("hidden");
      }

      function startGame() {
        buildGates();
        passedGates = 0;
        setLane(1);
        laneVisual = 1;
        setVolume(START_VOLUME);
        gameState = "running";
        previousTime = 0;
        statusLine.textContent =
          "Endless run. Stay in the best lane each gate.";
        hideOverlay();

        cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(tick);
      }

      function resolveGate(gate) {
        if (gate.resolved) {
          return;
        }

        gate.resolved = true;
        passedGates += 1;

        const effect = gate.effects[lane];
        if (effect) {
          setVolume(effect.apply(volume));
          statusLine.textContent = `Gate ${passedGates}: ${effect.label} on lane ${lane + 1}. Volume ${Math.round(volume)}%.`;
        } else {
          statusLine.textContent = `Gate ${passedGates}: lane ${lane + 1} no change.`;
        }
      }

      function update(dt) {
        for (const gate of gates) {
          gate.y += GATE_SPEED * dt;

          if (!gate.resolved && gate.y + GATE_HEIGHT * 0.5 >= PLAYER_Y) {
            resolveGate(gate);
          }
        }

        const recycleThreshold = VIEW_H + GATE_HEIGHT;
        let highestGateY = Infinity;
        for (const gate of gates) {
          highestGateY = Math.min(highestGateY, gate.y);
        }

        for (const gate of gates) {
          if (gate.y <= recycleThreshold) {
            continue;
          }
          gate.y = highestGateY - GATE_SPACING;
          gate.effects = createGateEffects();
          gate.resolved = false;
          highestGateY = gate.y;
        }

        laneVisual += (lane - laneVisual) * Math.min(1, dt * 18);
      }

      function drawBackground(layout) {
        const gradient = ctx.createLinearGradient(0, 0, 0, VIEW_H);
        gradient.addColorStop(0, "#f8f7f3");
        gradient.addColorStop(1, "#ece9e1");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, VIEW_W, VIEW_H);

        for (let i = 0; i < LANES; i += 1) {
          const laneX = layout.inset + i * layout.laneWidth;
          ctx.fillStyle =
            i % 2 === 0 ? "rgba(255,255,255,0.45)" : "rgba(255,255,255,0.28)";
          ctx.fillRect(laneX, 0, layout.laneWidth, VIEW_H);
        }

        ctx.strokeStyle = "rgba(23,23,23,0.14)";
        ctx.lineWidth = 1;
        for (let i = 0; i <= LANES; i += 1) {
          const x = layout.inset + i * layout.laneWidth;
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, VIEW_H);
          ctx.stroke();
        }

        ctx.strokeStyle = "rgba(23,23,23,0.1)";
        ctx.lineWidth = 1;
        for (let y = 32; y < VIEW_H; y += 32) {
          ctx.beginPath();
          ctx.moveTo(layout.inset, y);
          ctx.lineTo(VIEW_W - layout.inset, y);
          ctx.stroke();
        }
      }

      function gateStyle(effect) {
        if (!effect) {
          return {
            fill: "rgba(255,255,255,0.58)",
            stroke: "rgba(23,23,23,0.26)",
            text: "#5b5b56",
          };
        }

        if (effect.tone === "positive") {
          return {
            fill: "#e5efe5",
            stroke: "#5f8a64",
            text: "#29472d",
          };
        }

        return {
          fill: "#f5e4df",
          stroke: "#9e5d50",
          text: "#5f2418",
        };
      }

      function drawGates(layout) {
        for (const gate of gates) {
          if (gate.y < -80 || gate.y > VIEW_H + 70) {
            continue;
          }

          for (let laneIndex = 0; laneIndex < LANES; laneIndex += 1) {
            const effect = gate.effects[laneIndex];
            const style = gateStyle(effect);
            const centerX = layout.laneCenter(laneIndex);
            const x = centerX - layout.gateWidth * 0.5;
            const y = gate.y - layout.gateHeight * 0.5;

            ctx.fillStyle = style.fill;
            ctx.strokeStyle = style.stroke;
            ctx.lineWidth = gate.resolved ? 1 : 1.6;

            drawRoundedRect(x, y, layout.gateWidth, layout.gateHeight, 7);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = style.text;
            ctx.font =
              "600 15px 'Avenir Next', 'SF Pro Text', system-ui, sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(describeEffect(effect), centerX, gate.y);
          }
        }
      }

      function drawPlayer(layout) {
        const playerX = layout.laneCenter(laneVisual);
        const playerY = layout.playerY;

        const shownIcons = clamp(4 + Math.round(volume / 4), 4, 26);
        const offsets = getOffsets(shownIcons);

        ctx.save();
        ctx.fillStyle = "rgba(255,255,255,0.82)";
        drawRoundedRect(playerX - 58, playerY - 34, 116, 68, 12);
        ctx.fill();

        ctx.strokeStyle = "rgba(23,23,23,0.2)";
        ctx.lineWidth = 1;
        drawRoundedRect(playerX - 58, playerY - 34, 116, 68, 12);
        ctx.stroke();

        for (let i = 0; i < offsets.length; i += 1) {
          const offset = offsets[i];
          const depth = (i + 1) / offsets.length;
          drawSpeaker(
            playerX + offset.x * 1.45,
            playerY + offset.y * 0.9,
            9 + depth * 6,
            0.44 + depth * 0.44,
          );
        }

        ctx.fillStyle = "#171717";
        ctx.font =
          "600 12px 'Avenir Next', 'SF Pro Text', system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(`Lane ${lane + 1}`, playerX, playerY + 36);
        ctx.restore();
      }

      function drawProgress() {
        const ratio = (passedGates % 12) / 12;
        const x = 18;
        const y = VIEW_H - 16;
        const width = VIEW_W - 36;
        const height = 6;

        ctx.fillStyle = "rgba(23,23,23,0.12)";
        drawRoundedRect(x, y, width, height, 3);
        ctx.fill();

        ctx.fillStyle = "rgba(23,23,23,0.5)";
        drawRoundedRect(x, y, width * ratio, height, 3);
        ctx.fill();

        ctx.fillStyle = "rgba(23,23,23,0.68)";
        ctx.font =
          "600 12px 'Avenir Next', 'SF Pro Text', system-ui, sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "alphabetic";
        ctx.fillText(`Gates ${passedGates}`, 18, VIEW_H - 22);
      }

      function render() {
        const layout = getLayout(VIEW_W);
        ctx.clearRect(0, 0, VIEW_W, VIEW_H);
        drawBackground(layout);
        drawGates(layout);
        drawPlayer(layout);
        drawProgress();
      }

      function tick(timestamp) {
        if (gameState !== "running") {
          render();
          return;
        }

        if (previousTime === 0) {
          previousTime = timestamp;
        }

        const dt = Math.min((timestamp - previousTime) / 1000, 0.05);
        previousTime = timestamp;

        update(dt);
        render();

        if (gameState === "running") {
          rafId = requestAnimationFrame(tick);
        }
      }

      function laneFromClientX(clientX) {
        const rect = canvas.getBoundingClientRect();
        const inset = rect.width * 0.11;
        const laneWidth = (rect.width - inset * 2) / LANES;
        const localX = clamp(
          clientX - rect.left,
          inset,
          rect.width - inset - 1,
        );
        return clamp(Math.floor((localX - inset) / laneWidth), 0, LANES - 1);
      }

      function beginPointerControl(event) {
        if (gameState !== "running") {
          return;
        }

        pointerId = event.pointerId;
        canvas.setPointerCapture(pointerId);
        setLane(laneFromClientX(event.clientX));
      }

      function movePointerControl(event) {
        if (gameState !== "running") {
          return;
        }

        if (pointerId !== event.pointerId) {
          return;
        }

        setLane(laneFromClientX(event.clientX));
      }

      function endPointerControl(event) {
        if (pointerId !== event.pointerId) {
          return;
        }

        pointerId = null;
        try {
          canvas.releasePointerCapture(event.pointerId);
        } catch (error) {
          // Pointer capture may already be released.
        }
      }

      function onKeyDown(event) {
        if (gameState !== "running") {
          return;
        }

        if (event.key === "ArrowLeft" || event.key.toLowerCase() === "a") {
          event.preventDefault();
          setLane(lane - 1);
        } else if (
          event.key === "ArrowRight" ||
          event.key.toLowerCase() === "d"
        ) {
          event.preventDefault();
          setLane(lane + 1);
        }
      }

      function resizeCanvas() {
        dpr = window.devicePixelRatio || 1;
        canvas.width = Math.round(VIEW_W * dpr);
        canvas.height = Math.round(VIEW_H * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        render();
      }

      laneButtons.forEach((button, index) => {
        button.addEventListener("click", () => {
          setLane(index);
        });
      });

      primaryBtn.addEventListener("click", startGame);

      canvas.addEventListener("pointerdown", beginPointerControl);
      canvas.addEventListener("pointermove", movePointerControl);
      canvas.addEventListener("pointerup", endPointerControl);
      canvas.addEventListener("pointercancel", endPointerControl);

      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("resize", resizeCanvas);

      setVolume(START_VOLUME);
      setLane(1);
      resizeCanvas();
      render();
    </script>
  </body>
</html>
