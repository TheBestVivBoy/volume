<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Memory | Volume</title>
    <meta name="description" content="Match the pair. That's your volume." />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="theme-color" content="#f2f1ec" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Volume" />
    <meta property="og:title" content="Memory | Volume" />
    <meta
      property="og:description"
      content="Match the pair. That's your volume."
    />
    <meta property="og:url" content="https://vivancodes.com/sliders/memory/" />
    <meta
      property="og:image"
      content="https://vivancodes.com/assets/vivancodes_logo.png"
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Memory | Volume" />
    <meta
      name="twitter:description"
      content="Match the pair. That's your volume."
    />
    <link rel="canonical" href="https://vivancodes.com/sliders/memory/" />
    <link rel="icon" type="image/png" href="../../assets/vivancodes_logo.png" />
    <link rel="stylesheet" href="../../assets/site.css" />
    <style>
      :root {
        --ink: #111;
        --muted: #888;
        --line: rgba(17, 17, 17, 0.09);
        --shadow: 0 2px 16px rgba(0, 0, 0, 0.055);
      }

      body {
        user-select: none;
      }

      .project-stage {
        width: 100%;
        padding-bottom: 40px;
      }

      .wrap {
        width: min(98vw, 560px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .vol {
        font-size: clamp(3rem, 10vw, 4.2rem);
        font-weight: 300;
        color: var(--ink);
        letter-spacing: -0.06em;
        font-variant-numeric: tabular-nums;
        line-height: 1;
      }

      .game-wrap {
        position: relative;
        width: 100%;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        gap: clamp(2px, 0.6vw, 4px);
        width: 100%;
      }

      .card {
        aspect-ratio: 1;
        perspective: 500px;
        cursor: pointer;
      }

      .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
        transition: transform 0.26s ease;
        border-radius: 5px;
      }

      .card.up .card-inner,
      .card.done .card-inner {
        transform: rotateY(180deg);
      }

      .card-face {
        position: absolute;
        inset: 0;
        border-radius: 5px;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card-face.back {
        background: #fff;
        border: 1px solid var(--line);
      }

      .card-face.front {
        background: var(--ink);
        color: #fff;
        font-size: clamp(0.42rem, 1.55vw, 0.72rem);
        font-weight: 500;
        font-variant-numeric: tabular-nums;
        transform: rotateY(180deg);
      }

      .card.done .card-face.front {
        background: #ccc;
        color: #888;
      }

      .card.done {
        cursor: default;
        pointer-events: none;
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(242, 241, 236, 0.92);
        border-radius: 6px;
        z-index: 10;
      }
      .overlay.hidden {
        display: none;
      }

      .btn-start {
        background: var(--ink);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 10px 30px;
        font-size: 0.88rem;
        font-weight: 500;
        cursor: pointer;
        letter-spacing: -0.01em;
      }
      .btn-start:hover {
        opacity: 0.78;
      }

      .btn-reset {
        position: absolute;
        top: -22px;
        right: 0;
        background: none;
        border: none;
        padding: 0;
        font-size: 0.75rem;
        color: var(--muted);
        cursor: pointer;
        display: none;
      }
      .btn-reset:hover {
        color: var(--ink);
      }

      .hint {
        font-size: 0.82rem;
        color: var(--muted);
        text-align: center;
        min-height: 1.3em;
      }

      @media (prefers-reduced-motion: reduce) {
        .card-inner {
          transition: none;
        }
      }
    </style>
  </head>
  <body class="project-page" data-site-root="../../">
    <div class="page-shell">
      <div data-site-header></div>

      <header class="page-bar">
        <div class="page-bar-copy">
          <h1>Memory</h1>
          <p>Match the pair. That's your volume.</p>
        </div>
      </header>

      <main class="project-stage">
        <div class="wrap">
          <div class="vol" id="volLabel">—</div>

          <div class="game-wrap">
            <button class="btn-reset" id="btnReset">Reset</button>
            <div class="grid" id="grid"></div>
            <div class="overlay" id="overlay">
              <button class="btn-start" id="btnStart">Start</button>
            </div>
          </div>

          <p class="hint" id="hint">Press start to begin.</p>
        </div>
      </main>
    </div>

    <script src="../../assets/site.js"></script>
    <script>
      const gridEl = document.getElementById("grid");
      const overlay = document.getElementById("overlay");
      const btnStart = document.getElementById("btnStart");
      const btnReset = document.getElementById("btnReset");
      const volLabel = document.getElementById("volLabel");
      const hint = document.getElementById("hint");

      const POOL = Array.from({ length: 50 }, (_, i) => (i + 1) * 2);

      let cards = [];
      let firstPick = null;
      let locked = false;
      let matchCount = 0;

      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function setVol(v) {
        volLabel.textContent = `${v}%`;
      }

      function buildGrid() {
        gridEl.innerHTML = "";
        cards = [];
        firstPick = null;
        locked = false;
        matchCount = 0;

        const values = shuffle([...POOL, ...POOL]);

        values.forEach((n, i) => {
          const card = document.createElement("div");
          card.className = "card";
          card.dataset.value = n;
          card.dataset.idx = i;
          card.innerHTML = `
          <div class="card-inner">
            <div class="card-face back"></div>
            <div class="card-face front">${n}</div>
          </div>`;
          card.addEventListener("click", () => onCardClick(card));
          gridEl.appendChild(card);
          cards.push(card);
        });
      }

      function onCardClick(card) {
        if (locked) return;
        if (card.classList.contains("done")) return;
        if (card.classList.contains("up")) return;

        card.classList.add("up");

        if (!firstPick) {
          firstPick = card;
          return;
        }

        const a = firstPick;
        const b = card;
        firstPick = null;
        locked = true;

        if (
          a.dataset.value === b.dataset.value &&
          a.dataset.idx !== b.dataset.idx
        ) {
          setTimeout(() => {
            a.classList.replace("up", "done");
            b.classList.replace("up", "done");
            matchCount += 5;
            setVol(parseInt(a.dataset.value));
            hint.textContent =
              matchCount === 100
                ? `${a.dataset.value}%. All matched.`
                : `${a.dataset.value}%. Keep going.`;
            locked = false;
          }, 300);
        } else {
          hint.textContent = "No match.";
          setTimeout(() => {
            a.classList.remove("up");
            b.classList.remove("up");
            hint.textContent = "Find the matching pair.";
            locked = false;
          }, 900);
        }
      }

      function startGame() {
        buildGrid();
        volLabel.textContent = "—";
        hint.textContent = "Memorise…";
        overlay.classList.add("hidden");
        btnReset.style.display = "block";

        locked = true;
        cards.forEach((c) => c.classList.add("up"));

        setTimeout(() => {
          cards.forEach((c) => c.classList.remove("up"));
          setTimeout(() => {
            locked = false;
            hint.textContent = "Find the matching pair.";
          }, 280);
        }, 2000);
      }

      function resetGame() {
        buildGrid();
        volLabel.textContent = "—";
        hint.textContent = "Press start to begin.";
        overlay.classList.remove("hidden");
        btnReset.style.display = "none";
      }

      btnStart.addEventListener("click", startGame);
      btnReset.addEventListener("click", resetGame);

      buildGrid();
    </script>
  </body>
</html>
