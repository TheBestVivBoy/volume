<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cannon | Volume</title>
    <meta name="description" content="Hold to aim. Release to fire." />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="theme-color" content="#f2f1ec" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Volume" />
    <meta property="og:title" content="Cannon | Volume" />
    <meta property="og:description" content="Hold to aim. Release to fire." />
    <meta
      property="og:url"
      content="https://vivancodes.com/sliders/cannon/"
    />
    <meta
      property="og:image"
      content="https://vivancodes.com/assets/vivancodes_logo.png"
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Cannon | Volume" />
    <meta name="twitter:description" content="Hold to aim. Release to fire." />
    <link rel="canonical" href="https://vivancodes.com/sliders/cannon/" />
    <link rel="icon" type="image/png" href="../../assets/vivancodes_logo.png" />
    <link rel="stylesheet" href="../../assets/site.css" />
    <style>
      :root {
        --ink: #111;
        --muted: #888;
        --track-bg: #e2e2e4;
        --line: rgba(17, 17, 17, 0.09);
        --shadow: 0 2px 16px rgba(0, 0, 0, 0.055);
      }

      body {
        user-select: none;
      }

      .project-stage {
        min-height: min(72vh, 760px);
        width: 100%;
      }

      .wrap {
        width: min(92vw, 520px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .vol {
        font-size: clamp(3rem, 10vw, 4.2rem);
        font-weight: 300;
        color: var(--ink);
        letter-spacing: -0.06em;
        font-variant-numeric: tabular-nums;
        line-height: 1;
      }

      .card {
        position: relative;
        width: 100%;
        height: 116px;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .track {
        position: absolute;
        left: 72px;
        right: 18px;
        top: 50%;
        height: 4px;
        transform: translateY(-50%);
        border-radius: 99px;
        background: var(--track-bg);
        pointer-events: none;
      }

      .track-fill {
        position: absolute;
        inset: 0 auto 0 0;
        width: 0%;
        border-radius: 99px;
        background: var(--ink);
        transition: width 0.06s linear;
      }

      .launcher {
        position: absolute;
        left: 34px;
        top: 50%;
        width: 20px;
        height: 20px;
        background: none;
        border: none;
        padding: 0;
        margin: 0;
        cursor: pointer;
        touch-action: none;
        transform: translate(-50%, -50%) rotate(-0.35rad);
        color: var(--ink);
        -webkit-appearance: none;
        appearance: none;
      }

      .launcher:focus-visible {
        outline: 2px solid var(--ink);
        outline-offset: 6px;
        border-radius: 4px;
      }

      .launcher svg {
        display: block;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .ball {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--ink);
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .hint {
        font-size: 0.82rem;
        color: var(--muted);
        text-align: center;
        min-height: 1.3em;
      }

      @media (max-width: 480px) {
        .card {
          height: 104px;
          border-radius: 16px;
        }
        .track {
          left: 60px;
        }
        .launcher {
          left: 26px;
          width: 18px;
          height: 18px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .track-fill {
          transition: none;
        }
      }
    </style>
  </head>
  <body class="project-page" data-site-root="../../">
    <div class="page-shell">
      <div data-site-header></div>

      <header class="page-bar">
        <div class="page-bar-copy">
          <h1>Cannon</h1>
          <p>Hold to aim. Release to fire.</p>
        </div>
      </header>

      <main class="project-stage">
        <div class="wrap">
          <div class="vol" id="volLabel">0%</div>

          <div class="card" id="stage">
            <div class="track" aria-hidden="true">
              <div class="track-fill" id="trackFill"></div>
            </div>

            <button
              class="launcher"
              id="launcher"
              type="button"
              aria-label="Hold to aim, release to fire"
            >
              <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <path d="M9 3.5 5 7.5H2v5h3l4 4V3.5z" fill="currentColor" />
                <path
                  d="M13 7a4.5 4.5 0 0 1 0 6"
                  stroke="currentColor"
                  stroke-width="1.6"
                  stroke-linecap="round"
                />
              </svg>
            </button>

            <div class="ball" id="ball" aria-hidden="true"></div>
          </div>

          <p class="hint" id="hint">Hold the icon. Release to fire.</p>
        </div>
      </main>
    </div>

    <script src="../../assets/site.js"></script>
    <script>
      const stage = document.getElementById("stage");
      const launcher = document.getElementById("launcher");
      const ball = document.getElementById("ball");
      const trackFill = document.getElementById("trackFill");
      const volLabel = document.getElementById("volLabel");
      const hint = document.getElementById("hint");

      const MIN_ANGLE = -0.78;
      const MAX_ANGLE = 0.12;
      const ANGLE_SPEED = 1.8;
      const GRAVITY = 460;
      const ICON_OFFSET = 11;
      const BALL_R = 4;

      const s = {
        w: 0,
        h: 0,
        tLeft: 0,
        tRight: 0,
        tWidth: 0,
        tY: 0,
        pX: 0,
        pY: 0,
        angle: -0.35,
        dir: 1,
        aiming: false,
        b: null,
        vol: 0,
        speed: 460,
        last: performance.now(),
      };

      const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

      function layout() {
        const r = stage.getBoundingClientRect();
        const sm = r.width <= 420;
        s.w = r.width;
        s.h = r.height;
        s.tLeft = sm ? 60 : 72;
        s.tRight = r.width - 18;
        s.tWidth = s.tRight - s.tLeft;
        s.tY = r.height / 2;
        s.pX = sm ? 26 : 34;
        s.pY = s.tY;

        const reach = s.tRight - s.pX;
        s.speed = Math.sqrt((reach * GRAVITY) / Math.sin(-2 * MIN_ANGLE));

        drawLauncher();
        snapBall();
      }

      function drawLauncher() {
        launcher.style.left = `${s.pX}px`;
        launcher.style.top = `${s.pY}px`;
        launcher.style.transform = `translate(-50%,-50%) rotate(${s.angle}rad)`;
      }

      const pctToX = (p) => s.tLeft + (p / 100) * s.tWidth;
      const xToPct = (x) => ((x - s.tLeft) / s.tWidth) * 100;

      function setVol(p) {
        s.vol = clamp(Math.round(p), 0, 100);
        volLabel.textContent = `${s.vol}%`;
        trackFill.style.width = `${s.vol}%`;
      }

      function snapBall() {
        ball.style.left = `${pctToX(s.vol)}px`;
        ball.style.top = `${s.tY}px`;
      }

      function muzzle() {
        return {
          x: s.pX + Math.cos(s.angle) * ICON_OFFSET,
          y: s.pY + Math.sin(s.angle) * ICON_OFFSET,
        };
      }

      function aim() {
        if (s.b) return;
        s.aiming = true;
        hint.textContent = "Release to fire.";
      }

      function fire() {
        if (!s.aiming || s.b) return;
        s.aiming = false;
        const m = muzzle();
        s.b = {
          x: m.x,
          y: m.y,
          vx: Math.cos(s.angle) * s.speed,
          vy: Math.sin(s.angle) * s.speed,
        };
        ball.style.left = `${m.x}px`;
        ball.style.top = `${m.y}px`;
        hint.textContent = "In flight.";
      }

      function land(x) {
        const cx = clamp(x, s.tLeft, s.tRight);
        setVol(xToPct(cx));
        s.b = null;
        snapBall();
        hint.textContent = `${s.vol}%. Hold again.`;
      }

      launcher.addEventListener("pointerdown", (e) => {
        if (e.button) return;
        e.preventDefault();
        aim();
      });

      window.addEventListener("pointerup", (e) => {
        if (!e.button) fire();
      });
      window.addEventListener("pointercancel", () => fire());

      launcher.addEventListener("keydown", (e) => {
        if (e.repeat) return;
        if (e.key === " " || e.key === "Enter") {
          e.preventDefault();
          aim();
        }
      });
      launcher.addEventListener("keyup", (e) => {
        if (e.key === " " || e.key === "Enter") {
          e.preventDefault();
          fire();
        }
      });

      function tick(now) {
        const dt = Math.min((now - s.last) / 1000, 0.05);
        s.last = now;

        if (s.aiming) {
          s.angle += s.dir * ANGLE_SPEED * dt;
          if (s.angle <= MIN_ANGLE) {
            s.angle = MIN_ANGLE;
            s.dir = 1;
          }
          if (s.angle >= MAX_ANGLE) {
            s.angle = MAX_ANGLE;
            s.dir = -1;
          }
          drawLauncher();
        }

        if (s.b) {
          s.b.vy += GRAVITY * dt;
          s.b.x += s.b.vx * dt;
          s.b.y += s.b.vy * dt;

          if (s.b.x < BALL_R) {
            s.b.x = BALL_R;
            s.b.vx *= -0.25;
          }
          if (s.b.x > s.w - BALL_R) {
            s.b.x = s.w - BALL_R;
            s.b.vx *= -0.25;
          }
          if (s.b.y < BALL_R) {
            s.b.y = BALL_R;
            s.b.vy *= -0.15;
          }

          ball.style.left = `${s.b.x}px`;
          ball.style.top = `${s.b.y}px`;

          if (s.b.vy > 0 && s.b.y >= s.tY) land(s.b.x);
        }

        requestAnimationFrame(tick);
      }

      window.addEventListener("resize", layout, { passive: true });
      layout();
      setVol(0);
      snapBall();
      requestAnimationFrame(tick);
    </script>
  </body>
</html>
