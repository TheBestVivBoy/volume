    <style>
      body {
        user-select: none;
      }

      .project-stage {
        min-height: min(70vh, 760px);
        width: 100%;
      }

      .wrap {
        width: min(92vw, 520px);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .title {
        font-size: 1.25rem;
        font-weight: 600;
        color: #111;
        margin-bottom: 6px;
      }

      .volume {
        font-size: clamp(3rem, 10vw, 3.6rem);
        font-weight: 200;
        color: #111;
        margin-bottom: 22px;
        letter-spacing: -0.04em;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }

      .slider-shell {
        width: 100%;
        background: #fff;
        border: 1.5px solid #e6e6e6;
        border-radius: 18px;
        padding: 22px 20px 18px;
        box-shadow: 0 8px 26px rgba(0, 0, 0, 0.04);
      }

      .control-row {
        display: grid;
        grid-template-columns: 88px minmax(0, 1fr) 88px;
        align-items: center;
        gap: 12px;
        min-height: 42px;
      }

      .action {
        appearance: none;
        border: 1.5px solid #dcdcdc;
        background: #fafafa;
        color: #111;
        border-radius: 999px;
        height: 40px;
        padding: 0 14px;
        font: inherit;
        font-size: 0.92rem;
        letter-spacing: -0.01em;
        cursor: pointer;
        transition:
          background 120ms ease,
          border-color 120ms ease,
          transform 120ms ease;
        position: relative;
        z-index: 2;
      }

      .action:hover {
        background: #f4f4f4;
      }
      .action:active {
        transform: translateY(0.5px);
      }
      .action:focus-visible {
        outline: 2px solid #111;
        outline-offset: 3px;
      }

      .track-wrap {
        position: relative;
        height: 34px;
        display: flex;
        align-items: center;
        cursor: pointer;
      }

      /* Expand hit area without changing visual size */
      .track-wrap::before {
        content: "";
        position: absolute;
        inset: -10px 0;
      }

      .track {
        position: absolute;
        left: 0;
        right: 0;
        height: 8px;
        border-radius: 999px;
        background: #e9e9e9;
        overflow: visible;
      }

      .track-fill {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 50%;
        border-radius: 999px;
        background: #111;
        transition: width 0s; /* instant during drag */
      }

      .thumb {
        position: absolute;
        top: 50%;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: #fff;
        border: 1.5px solid #d8d8d8;
        box-shadow:
          0 3px 10px rgba(0, 0, 0, 0.08),
          0 1px 2px rgba(0, 0, 0, 0.06);
        transform: translate(-50%, -50%);
        pointer-events: none;
        transition: box-shadow 120ms ease;
      }

      .track-wrap.dragging .thumb {
        box-shadow:
          0 4px 16px rgba(0, 0, 0, 0.14),
          0 1px 2px rgba(0, 0, 0, 0.08);
      }

      .hint {
        margin-top: 14px;
        min-height: 1.1em;
        font-size: 0.8rem;
        color: #969696;
        text-align: center;
        letter-spacing: -0.01em;
      }

      @media (max-width: 640px) {
        .project-stage {
          min-height: auto;
        }
        .slider-shell {
          padding: 18px 16px 16px;
        }
        .control-row {
          grid-template-columns: 78px minmax(0, 1fr) 78px;
          gap: 10px;
        }
        .action {
          height: 38px;
          padding: 0 10px;
          font-size: 0.88rem;
        }
      }
    </style>
  </head>
  <body class="project-page" data-site-root="../../">
    <div class="page-shell">
      <div data-site-header></div>

      <header class="page-bar">
        <div class="page-bar-copy">
          <h1>Confirmation</h1>
          <p>Set the volume. Then commit.</p>
        </div>
      </header>

      <main class="project-stage">
        <div class="wrap">
          <div class="title">Volume</div>
          <div class="volume" id="volumeLabel">50%</div>

          <div class="slider-shell">
            <div class="control-row" aria-label="Confirmation volume control">
              <button
                class="action"
                id="cancelButton"
                type="button"
                aria-label="Cancel pending volume change"
              >
                Cancel
              </button>

              <div class="track-wrap" id="trackWrap">
                <div class="track" aria-hidden="true">
                  <div class="track-fill" id="trackFill"></div>
                  <div class="thumb" id="thumb" aria-hidden="true"></div>
                </div>
              </div>

              <button
                class="action"
                id="confirmButton"
                type="button"
                aria-label="Confirm pending volume change"
              >
                Confirm
              </button>
            </div>

            <div class="hint" id="hint">Pending: 50%</div>
          </div>
        </div>
      </main>
    </div>

    <script>
      // Replace the entire <script> block with this:
      const confirmButton = document.getElementById("confirmButton");
      const cancelButton = document.getElementById("cancelButton");
      const trackWrap = document.getElementById("trackWrap");
      const trackFill = document.getElementById("trackFill");
      const thumb = document.getElementById("thumb");
      const volumeLabel = document.getElementById("volumeLabel");
      const hint = document.getElementById("hint");

      const state = { confirmed: 0.5, pending: 0.5 };

      function clamp(v, lo, hi) {
        return Math.max(lo, Math.min(hi, v));
      }
      function toPercent(v) {
        return Math.round(clamp(v, 0, 1) * 100);
      }

      function setPendingFromClientX(clientX) {
        const rect = trackWrap.getBoundingClientRect();
        state.pending = clamp((clientX - rect.left) / rect.width, 0, 1);
        render();
      }

      function render() {
        const cp = toPercent(state.confirmed);
        const pp = toPercent(state.pending);
        volumeLabel.textContent = `${cp}%`;
        trackFill.style.width = `${pp}%`;
        thumb.style.left = `${pp}%`;
        hint.textContent = `Pending: ${pp}%`;
      }

      window.addEventListener("mousemove", (e) =>
        setPendingFromClientX(e.clientX),
      );

      window.addEventListener(
        "touchstart",
        (e) => {
          const t = e.touches[0];
          if (t) setPendingFromClientX(t.clientX);
        },
        { passive: true },
      );

      window.addEventListener(
        "touchmove",
        (e) => {
          const t = e.touches[0];
          if (t) setPendingFromClientX(t.clientX);
        },
        { passive: true },
      );

      confirmButton.addEventListener("click", () => {
        state.confirmed = state.pending;
        render();
      });
      cancelButton.addEventListener("click", () => {
        state.pending = state.confirmed;
        render();
      });

      render();
    </script>
