<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vertical | Volume</title>
    <meta name="description" content="A volume slider. Drag up." />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="theme-color" content="#f2f1ec" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Volume" />
    <meta property="og:title" content="Vertical | Volume" />
    <meta property="og:description" content="A volume slider. Drag up." />
    <meta
      property="og:url"
      content="https://volume.vivan.site/sliders/vertical/"
    />
    <meta

      content="https://volume.vivan.site/assets/vivancodes_logo.png"
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Vertical | Volume" />
    <meta name="twitter:description" content="A volume slider. Drag up." />
    <link rel="canonical" href="https://volume.vivan.site/sliders/vertical/" />
    <link rel="icon" type="image/png" href="../../assets/vivancodes_logo.png" />
    <link rel="stylesheet" href="../../assets/site.css" />
    <style>
      body {
        user-select: none;
      }

      .project-stage {
        min-height: min(70vh, 760px);
        width: 100%;
      }

      .wrap {
        width: min(92vw, 560px);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .title {
        font-size: 1.25rem;
        font-weight: 600;
        color: #111;
        margin-bottom: 6px;
      }

      .volume {
        font-size: clamp(3rem, 10vw, 3.5rem);
        font-weight: 200;
        color: #111;
        margin-bottom: 22px;
        letter-spacing: -0.03em;
        font-variant-numeric: tabular-nums;
      }

      .slider-shell {
        width: 100%;
        background: #fff;
        border: 1.5px solid #e6e6e6;
        border-radius: 18px;
        padding: 24px 22px;
        box-shadow: 0 8px 26px rgba(0, 0, 0, 0.04);
      }

      .slider-row {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .icon {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
        color: #999;
      }

      /* Track wrap is tall enough for thumb to travel vertically */
      .track-wrap {
        position: relative;
        flex: 1;
        height: 80px;
        display: flex;
        align-items: center;
        touch-action: none;
        cursor: ns-resize;
      }

      /* The visual track bar — horizontal, centered vertically */
      .track {
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        height: 8px;
        transform: translateY(-50%);
        border-radius: 999px;
        background: #e9e9e9;
        overflow: hidden;
        pointer-events: none;
      }

      .track-fill {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 50%;
        border-radius: 999px;
        background: #111;
      }

      /* Thumb is centered horizontally, moves only on Y axis */
      .thumb {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: #fff;
        border: 1.5px solid #d8d8d8;
        box-shadow:
          0 3px 10px rgba(0, 0, 0, 0.08),
          0 1px 2px rgba(0, 0, 0, 0.06);
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .hint {
        margin-top: 14px;
        font-size: 0.8rem;
        color: #969696;
        text-align: center;
      }

      @media (max-width: 640px) {
        .project-stage {
          min-height: auto;
        }

        .slider-shell {
          padding: 20px 18px;
        }

        .slider-row {
          gap: 10px;
        }
      }
    </style>
  </head>
  <body class="project-page" data-site-root="../../">
    <div class="page-shell">
      <div data-site-header></div>

      <header class="page-bar">
        <div class="page-bar-copy">
          <h1>Vertical</h1>
          <p>A slider. Drag the wrong way.</p>
        </div>
      </header>

      <main class="project-stage">
        <div class="wrap">
          <div class="title">Adjust Volume</div>
          <div class="volume" id="volumeLabel">50%</div>

          <div class="slider-shell">
            <div class="slider-row">
              <svg
                class="icon"
                viewBox="0 0 24 24"
                fill="none"
                aria-hidden="true"
              >
                <path d="M11 5L6 9H2v6h4l5 4V5z" fill="currentColor" />
                <path
                  d="M15.2 9.1a4.2 4.2 0 0 1 0 5.8"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </svg>

              <div
                class="track-wrap"
                id="trackWrap"
                tabindex="0"
                role="slider"
                aria-label="Vertical volume slider"
                aria-valuemin="0"
                aria-valuemax="100"
                aria-valuenow="50"
                aria-valuetext="50%"
                aria-orientation="vertical"
              >
                <div class="track" aria-hidden="true">
                  <div class="track-fill" id="trackFill"></div>
                </div>
                <div class="thumb" id="thumb" aria-hidden="true"></div>
              </div>

              <svg
                class="icon"
                viewBox="0 0 24 24"
                fill="none"
                aria-hidden="true"
              >
                <path d="M11 5L6 9H2v6h4l5 4V5z" fill="currentColor" />
                <path
                  d="M15.54 8.46a5 5 0 0 1 0 7.07"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
                <path
                  d="M18.36 5.64a9 9 0 0 1 0 12.73"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </svg>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div class="bmc-script-mount" aria-hidden="true">
      <script
        type="text/javascript"
        src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js"
        data-name="bmc-button"
        data-slug="vivancodes"
        data-color="#FFDD00"
        data-emoji="🔊"
        data-font="Cookie"
        data-text="Buy me volume"
        data-outline-color="#000000"
        data-font-color="#000000"
        data-coffee-color="#ffffff"
      ></script>
    </div>

    <script
      data-name="BMC-Widget"
      data-cfasync="false"
      src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js"
      data-id="vivancodes"
      data-description="Support me on Buy me a coffee!"
      data-message="Your volume. Higher."
      data-color="#5F7FFF"
      data-position="Right"
      data-x_margin="18"
      data-y_margin="18"
    ></script>

    <script src="../../assets/site.js"></script>
    <script>
      const trackWrap = document.getElementById("trackWrap");
      const thumb = document.getElementById("thumb");
      const trackFill = document.getElementById("trackFill");
      const volumeLabel = document.getElementById("volumeLabel");

      const state = {
        normalized: 0.5,
        dragging: false,
        pointerId: null,
      };

      function clamp(v, lo, hi) {
        return Math.max(lo, Math.min(hi, v));
      }

      function render() {
        const pct = state.normalized * 100;
        const rounded = Math.round(pct);

        // Fill goes left → right
        trackFill.style.width = `${pct}%`;

        // Thumb moves top → bottom (top = 100%, bottom = 0%)
        const wrapH = trackWrap.clientHeight;
        const thumbY = (1 - state.normalized) * wrapH;
        thumb.style.top = `${thumbY}px`;

        volumeLabel.textContent = `${rounded}%`;
        trackWrap.setAttribute("aria-valuenow", String(rounded));
        trackWrap.setAttribute("aria-valuetext", `${rounded}%`);
      }

      function setFromClientY(clientY) {
        const rect = trackWrap.getBoundingClientRect();
        const relative = clamp(clientY - rect.top, 0, rect.height);
        state.normalized = 1 - relative / rect.height;
        render();
      }

      trackWrap.addEventListener("pointerdown", (event) => {
        if (event.button !== undefined && event.button !== 0) return;
        event.preventDefault();
        trackWrap.focus({ preventScroll: true });
        state.dragging = true;
        state.pointerId = event.pointerId;
        trackWrap.setPointerCapture(event.pointerId);
        setFromClientY(event.clientY);
      });

      window.addEventListener("pointermove", (event) => {
        if (!state.dragging || event.pointerId !== state.pointerId) return;
        setFromClientY(event.clientY);
      });

      function stopDrag(event) {
        if (!state.dragging || event.pointerId !== state.pointerId) return;
        state.dragging = false;
        state.pointerId = null;
      }

      window.addEventListener("pointerup", stopDrag);
      window.addEventListener("pointercancel", stopDrag);

      trackWrap.addEventListener("keydown", (event) => {
        const step = event.shiftKey ? 0.1 : 0.02;
        let next = null;

        if (event.key === "ArrowUp" || event.key === "ArrowRight")
          next = state.normalized + step;
        else if (event.key === "ArrowDown" || event.key === "ArrowLeft")
          next = state.normalized - step;
        else if (event.key === "PageUp") next = state.normalized + 0.1;
        else if (event.key === "PageDown") next = state.normalized - 0.1;
        else if (event.key === "Home") next = 0;
        else if (event.key === "End") next = 1;

        if (next === null) return;
        event.preventDefault();
        state.normalized = clamp(next, 0, 1);
        render();
      });

      window.addEventListener("resize", render, { passive: true });
      render();
    </script>
  </body>
</html>
