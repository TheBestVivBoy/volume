<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta name="description" content="Press to pump. It leaks." />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="theme-color" content="#f2f1ec" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Volume" />
    <meta property="og:title" content="Pump | Volume" />
    <meta property="og:description" content="Press to pump. It leaks." />
    <meta property="og:url" content="https://volume.vivan.site/sliders/pump/" />
    <meta
      property="og:image"
      content="https://volume.vivan.site/assets/vivancodes_logo.png"
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Pump | Volume" />
    <meta name="twitter:description" content="Press to pump. It leaks." />
    <link rel="canonical" href="https://volume.vivan.site/sliders/pump/" />
    <link rel="icon" type="image/png" href="../../assets/vivancodes_logo.png" />
    <link rel="stylesheet" href="../../assets/site.css" />
    <style>
      body {
        user-select: none;
      }

      .project-stage {
        min-height: min(70vh, 760px);
        width: 100%;
      }

      .wrap {
        width: min(92vw, 560px);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .title {
        font-size: 1.25rem;
        font-weight: 600;
        color: #111;
        margin-bottom: 6px;
      }

      .volume {
        font-size: clamp(3rem, 10vw, 3.5rem);
        font-weight: 200;
        color: #111;
        margin-bottom: 22px;
        letter-spacing: -0.03em;
        font-variant-numeric: tabular-nums;
      }

      .slider-shell {
        width: 100%;
        background: #fff;
        border: 1.5px solid #e6e6e6;
        border-radius: 18px;
        padding: 24px 22px;
        box-shadow: 0 8px 26px rgba(0, 0, 0, 0.04);
      }

      .slider-row {
        display: flex;
        align-items: center;
        gap: 0;
      }

      .icon {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
        color: #999;
      }

      /* pump column */
      .pump-col {
        flex: 0 0 28px;
        position: relative;
        height: 88px;
        display: flex;
        justify-content: center;
      }

      .pump-rail {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 50%;
        width: 2px;
        transform: translateX(-50%);
        background: #e9e9e9;
        border-radius: 999px;
        pointer-events: none;
      }

      .pump-handle {
        position: absolute;
        top: 0;
        left: 50%;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: #fff;
        border: 1.5px solid #d8d8d8;
        box-shadow:
          0 3px 10px rgba(0, 0, 0, 0.08),
          0 1px 2px rgba(0, 0, 0, 0.06);
        transform: translateX(-50%);
        cursor: ns-resize;
        touch-action: none;
      }

      .pump-handle:focus-visible {
        outline: 2px solid #111;
        outline-offset: 4px;
      }

      /* pipe */
      .pipe {
        flex: 0 0 14px;
        height: 2px;
        background: #e9e9e9;
        border-radius: 999px;
      }

      /* track */
      .track-wrap {
        position: relative;
        flex: 1;
        height: 34px;
        display: flex;
        align-items: center;
      }

      .track {
        position: absolute;
        left: 0;
        right: 0;
        height: 8px;
        border-radius: 999px;
        background: #e9e9e9;
        overflow: hidden;
      }

      .track-fill {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 0%;
        border-radius: 999px;
        background: #111;
      }

      .thumb {
        position: absolute;
        top: 50%;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: #fff;
        border: 1.5px solid #d8d8d8;
        box-shadow:
          0 3px 10px rgba(0, 0, 0, 0.08),
          0 1px 2px rgba(0, 0, 0, 0.06);
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .icon-gap {
        flex: 0 0 14px;
      }

      .hint {
        margin-top: 14px;
        font-size: 0.8rem;
        color: #969696;
        text-align: center;
      }

      @media (max-width: 640px) {
        .project-stage {
          min-height: auto;
        }

        .slider-shell {
          padding: 20px 16px;
        }

        .pipe {
          flex: 0 0 10px;
        }
      }
    </style>
  </head>
  <body class="project-page" data-site-root="../../">
    <div class="page-shell">
      <div data-site-header></div>

      <header class="page-bar">
        <div class="page-bar-copy">
          <h1>Pump</h1>
          <p>Drag down. Release. Repeat.</p>
        </div>
      </header>

      <main class="project-stage">
        <div class="wrap">
          <div class="title">Adjust Volume</div>
          <div class="volume" id="volumeLabel">0%</div>

          <div class="slider-shell">
            <div class="slider-row">
              <div class="pump-col" aria-hidden="true">
                <div class="pump-rail"></div>
                <div
                  class="pump-handle"
                  id="pumpHandle"
                  tabindex="0"
                  role="slider"
                  aria-label="Pump handle — drag down to increase volume"
                  aria-valuemin="0"
                  aria-valuemax="100"
                  aria-valuenow="0"
                ></div>
              </div>

              <div class="pipe" aria-hidden="true"></div>

              <div class="track-wrap" aria-hidden="true">
                <div class="track">
                  <div class="track-fill" id="trackFill"></div>
                </div>
                <div class="thumb" id="thumb"></div>
              </div>

              <div class="icon-gap"></div>

              <svg
                class="icon"
                viewBox="0 0 24 24"
                fill="none"
                aria-hidden="true"
              >
                <path d="M11 5L6 9H2v6h4l5 4V5z" fill="currentColor" />
                <path
                  d="M15.54 8.46a5 5 0 0 1 0 7.07"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
                <path
                  d="M18.36 5.64a9 9 0 0 1 0 12.73"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </svg>
            </div>

            <div class="hint" id="hint">
              Drag the handle down. It springs back.
            </div>
          </div>
        </div>
      </main>
    </div>

    <div class="bmc-script-mount" aria-hidden="true">
      <script
        type="text/javascript"
        src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js"
        data-name="bmc-button"
        data-slug="vivancodes"
        data-color="#FFDD00"
        data-emoji="🔊"
        data-font="Cookie"
        data-text="Buy me volume"
        data-outline-color="#000000"
        data-font-color="#000000"
        data-coffee-color="#ffffff"
      ></script>
    </div>

    <script
      data-name="BMC-Widget"
      data-cfasync="false"
      src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js"
      data-id="vivancodes"
      data-description="Support me on Buy me a coffee!"
      data-message="Your volume. Higher."
      data-color="#5F7FFF"
      data-position="Right"
      data-x_margin="18"
      data-y_margin="18"
    ></script>

    <script src="../../assets/site.js"></script>
    <script>
      const pumpHandle = document.getElementById("pumpHandle");
      const trackFill = document.getElementById("trackFill");
      const thumb = document.getElementById("thumb");
      const volumeLabel = document.getElementById("volumeLabel");
      const hint = document.getElementById("hint");

      const HANDLE_SIZE = 28;
      const COL_HEIGHT = 88;
      const TRAVEL = COL_HEIGHT - HANDLE_SIZE; // 60px
      const PUMP_GAIN = 5 / TRAVEL; // ~5% per full downstroke
      const DECAY_PER_SECOND = 4;

      const state = {
        handleY: 0,
        volume: 0,
        dragging: false,
        pointerId: null,
        lastPointerY: 0,
        trackWidth: 1,
        lastTime: performance.now(),
      };

      function clamp(v, lo, hi) {
        return Math.max(lo, Math.min(hi, v));
      }

      function updateBounds() {
        state.trackWidth = Math.max(thumb.parentElement.clientWidth, 1);
        render();
      }

      function render() {
        // handle position
        pumpHandle.style.top = `${state.handleY}px`;

        // track
        const pct = state.volume;
        trackFill.style.width = `${pct}%`;
        thumb.style.left = `${(pct / 100) * state.trackWidth}px`;

        // readout
        const rounded = Math.round(pct);
        volumeLabel.textContent = `${rounded}%`;
        pumpHandle.setAttribute("aria-valuenow", rounded);

        // hint
        if (rounded >= 100) {
          hint.textContent = "Maximum. Still leaking.";
        } else if (rounded > 0) {
          hint.textContent = "Keep pumping.";
        } else {
          hint.textContent = "Drag the handle down. It springs back.";
        }
      }

      pumpHandle.addEventListener("pointerdown", (event) => {
        if (event.button !== undefined && event.button !== 0) return;
        event.preventDefault();
        state.dragging = true;
        state.pointerId = event.pointerId;
        state.lastPointerY = event.clientY;
        pumpHandle.setPointerCapture(event.pointerId);
        pumpHandle.focus({ preventScroll: true });
      });

      window.addEventListener("pointermove", (event) => {
        if (!state.dragging || event.pointerId !== state.pointerId) return;

        const delta = event.clientY - state.lastPointerY;
        state.lastPointerY = event.clientY;

        const prevY = state.handleY;
        state.handleY = clamp(state.handleY + delta, 0, TRAVEL);
        const downstroke = state.handleY - prevY;

        if (downstroke > 0) {
          state.volume = clamp(state.volume + downstroke * PUMP_GAIN, 0, 100);
        }

        render();
      });

      function stopDrag(event) {
        if (!state.dragging || event.pointerId !== state.pointerId) return;
        state.dragging = false;
        state.pointerId = null;
      }

      window.addEventListener("pointerup", stopDrag);
      window.addEventListener("pointercancel", stopDrag);

      pumpHandle.addEventListener("keydown", (event) => {
        if ([" ", "Enter", "ArrowDown"].includes(event.key)) {
          event.preventDefault();
          state.volume = clamp(state.volume + 5, 0, 100);
          state.handleY = TRAVEL;
          render();
        }
      });

      function tick(now) {
        const dt = Math.min((now - state.lastTime) / 1000, 0.05);
        state.lastTime = now;

        if (!state.dragging && state.handleY > 0.2) {
          state.handleY += (0 - state.handleY) * 0.2;
          if (state.handleY < 0.2) state.handleY = 0;
          render();
        }

        // volume decay
        if (state.volume > 0) {
          state.volume = clamp(state.volume - dt * DECAY_PER_SECOND, 0, 100);
          render();
        }

        requestAnimationFrame(tick);
      }

      window.addEventListener("resize", updateBounds, { passive: true });
      updateBounds();
      requestAnimationFrame(tick);
    </script>
  </body>
</html>
